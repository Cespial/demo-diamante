<!DOCTYPE html>
<html>
<head>
  <title>Google Maps Test</title>
  <style>
    #map { width: 100%; height: 500px; }
    #errors { padding: 20px; font-family: monospace; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h2>Google Maps API Test</h2>
  <div id="errors"></div>
  <div id="map"></div>
  <script>
    window.gm_authFailure = function() {
      document.getElementById('errors').textContent += 'AUTH FAILURE: API key rejected\n';
    };
    window.onerror = function(msg, url, line) {
      document.getElementById('errors').textContent += 'JS ERROR: ' + msg + '\n';
    };
    function initMap() {
      document.getElementById('errors').textContent += 'initMap called - Maps JS loaded OK\n';
      try {
        var map = new google.maps.Map(document.getElementById('map'), {
          center: { lat: 6.2565, lng: -75.5905 },
          zoom: 15,
          mapTypeId: 'hybrid'
        });
        document.getElementById('errors').textContent += 'Map created successfully\n';
        new google.maps.Marker({
          position: { lat: 6.2565, lng: -75.5905 },
          map: map,
          title: 'Diamante'
        });
        document.getElementById('errors').textContent += 'Marker added\n';
      } catch(e) {
        document.getElementById('errors').textContent += 'MAP ERROR: ' + e.message + '\n';
      }
    }
  </script>
  <script async defer
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCDtpnJoftns_RXlJhDkLrLwOmdDPoQy10&callback=initMap&v=weekly"
    onerror="document.getElementById('errors').textContent += 'SCRIPT LOAD ERROR\n'">
  </script>
</body>
</html>
